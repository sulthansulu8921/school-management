services:
  # Backend Service
  - type: web
    name: school-manage-backend
    plan: free
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-manage-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

  # Frontend Service
  - type: web
    name: school-manage-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: school-manage-backend
          property: host

databases:
  - name: school-manage-db
    plan: free
